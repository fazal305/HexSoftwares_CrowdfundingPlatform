<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auth | Crowdfunding Platform</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111120;
      --cyan: #00f5ff;
      --purple: #bf5fff;
      --text: #e8e8f0;
      --muted: #7a788a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-box {
      width: 420px;
      background: var(--surface);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid #222;
    }

    .btn-cyber {
      background: var(--cyan);
      color: black;
      font-weight: bold;
    }

    .toggle-link {
      color: var(--purple);
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="auth-box">

  <h3 class="text-center mb-3">Crowdfunding Platform</h3>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <h5>Login</h5>

    <input id="loginEmail" class="form-control mb-2" placeholder="Email">
    <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-cyber w-100" id="loginBtn">Login</button>

    <p class="mt-3 text-center">
      No account?
      <span class="toggle-link" id="showRegister">Register</span>
    </p>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" class="hidden">
    <h5>Register</h5>

    <input id="regName" class="form-control mb-2" placeholder="Name">
    <input id="regEmail" class="form-control mb-2" placeholder="Email">
    <input id="regPassword" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-cyber w-100" id="registerBtn">Register</button>

    <p class="mt-3 text-center">
      Already have account?
      <span class="toggle-link" id="showLogin">Login</span>
    </p>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
const API_URL = "https://hexsoftwares-crowdfundingplatform.onrender.com";

// Toggle forms
$("#showRegister").click(function () {
  $("#loginForm").hide();
  $("#registerForm").show();
});

$("#showLogin").click(function () {
  $("#registerForm").hide();
  $("#loginForm").show();
});

// REGISTER
$("#registerBtn").click(async function () {
  const name = $("#regName").val();
  const email = $("#regEmail").val();
  const password = $("#regPassword").val();

  try {
    const res = await fetch(`${API_URL}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      window.location.href = "index.html";
    } else {
      alert(data.message);
    }

  } catch (err) {
    alert("Registration failed");
  }
});

// LOGIN
$("#loginBtn").click(async function () {
  const email = $("#loginEmail").val();
  const password = $("#loginPassword").val();

  try {
    const res = await fetch(`${API_URL}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.token);
      window.location.href = "index.html";
    } else {
      alert(data.message);
    }

  } catch (err) {
    alert("Login failed");
  }
});
</script>

</body>
</html>
