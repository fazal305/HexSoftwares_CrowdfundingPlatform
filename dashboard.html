<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | Crowdfunding Platform</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111120;
      --cyan: #00f5ff;
      --text: #e8e8f0;
      --muted: #7a788a;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    .card-custom {
      background: var(--surface);
      border: 1px solid #222;
      border-radius: 12px;
      padding: 15px;
    }

    .btn-cyber {
      background: var(--cyan);
      color: black;
      font-weight: bold;
    }

    .muted {
      color: var(--muted);
    }

    .section {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <h3>Dashboard</h3>

  <!-- PROFILE -->
  <div class="card-custom mb-3">
    <h5 id="userName">Loading...</h5>
    <p id="userEmail" class="muted"></p>
  </div>

  <!-- STATS -->
  <div class="row text-center mb-3">
    <div class="col-md-4">
      <div class="card-custom">
        <h4 id="myProjectsCount">0</h4>
        <p class="muted">My Projects</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card-custom">
        <h4 id="myContributionsCount">0</h4>
        <p class="muted">My Contributions</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card-custom">
        <h4 id="totalSpent">0 PKR</h4>
        <p class="muted">Total Spent</p>
      </div>
    </div>
  </div>

  <!-- MY PROJECTS -->
  <div class="section">
    <h5>My Projects</h5>
    <div id="myProjects"></div>
  </div>

  <!-- MY CONTRIBUTIONS -->
  <div class="section">
    <h5>My Contributions</h5>
    <div id="myContributions"></div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
const API = "https://hexsoftwares-crowdfundingplatform.onrender.com";

const token = localStorage.getItem("token");

// Redirect if not logged in
if (!token) {
  window.location.href = "auth.html";
}

// Load user profile
async function loadUser() {
  const res = await fetch(`${API}/auth/me`, {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const user = await res.json();

  $("#userName").text(user.name);
  $("#userEmail").text(user.email);
}

// Load my projects
async function loadMyProjects() {
  const res = await fetch(`${API}/projects/my-projects`, {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const projects = await res.json();

  $("#myProjectsCount").text(projects.length);

  let html = "";

  projects.forEach(p => {
    html += `
      <div class="card-custom mb-2">
        <h6>${p.title}</h6>
        <p class="muted">${p.category}</p>
        <p>${p.currentFunding} / ${p.fundingGoal} PKR</p>
      </div>
    `;
  });

  $("#myProjects").html(html);
}

// Load contributions
async function loadMyContributions() {
  const res = await fetch(`${API}/contributions/my-contributions`, {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const contributions = await res.json();

  $("#myContributionsCount").text(contributions.length);

  let total = 0;
  let html = "";

  contributions.forEach(c => {
    total += c.amount;

    html += `
      <div class="card-custom mb-2">
        <h6>${c.projectId.title}</h6>
        <p>${c.amount} PKR - ${c.paymentStatus}</p>
      </div>
    `;
  });

  $("#totalSpent").text(total + " PKR");

  $("#myContributions").html(html);
}

// Load all
loadUser();
loadMyProjects();
loadMyContributions();
</script>

</body>
</html>
