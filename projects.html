<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Projects | Crowdfunding Platform</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #111120;
        --cyan: #00f5ff;
        --text: #e8e8f0;
        --muted: #7a788a;
      }

      body {
        background: var(--bg);
        color: var(--text);
      }

      .card-custom {
        background: var(--surface);
        border: 1px solid #222;
        border-radius: 12px;
        padding: 15px;
        transition: 0.2s;
      }

      .card-custom:hover {
        transform: translateY(-3px);
        border-color: var(--cyan);
      }

      .btn-cyber {
        background: var(--cyan);
        color: black;
        font-weight: bold;
      }

      .muted {
        color: var(--muted);
      }

      .filters {
        background: var(--surface);
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #222;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <h2 class="mb-3">Browse Projects</h2>

      <!-- FILTERS -->
      <div class="filters mb-4">
        <div class="row">
          <div class="col-md-3">
            <input
              id="search"
              class="form-control"
              placeholder="Search projects"
            />
          </div>

          <div class="col-md-3">
            <select id="category" class="form-control">
              <option value="">All Categories</option>
              <option>Technology</option>
              <option>Art</option>
              <option>Music</option>
              <option>Film</option>
              <option>Food</option>
              <option>Community</option>
              <option>Education</option>
              <option>Health</option>
            </select>
          </div>

          <div class="col-md-3">
            <select id="sort" class="form-control">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="funding">Most Funded</option>
            </select>
          </div>

          <div class="col-md-3">
            <button class="btn btn-cyber w-100" onclick="loadProjects(1)">
              Apply
            </button>
          </div>
        </div>
      </div>

      <!-- PROJECT LIST -->
      <div class="row" id="projectList"></div>

      <!-- PAGINATION -->
      <div class="text-center mt-4">
        <button class="btn btn-outline-light" onclick="prevPage()">Prev</button>
        <span id="pageInfo" class="mx-2"></span>
        <button class="btn btn-outline-light" onclick="nextPage()">Next</button>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
      const API_URL = "https://hexsoftwares-crowdfundingplatform.onrender.com";

      let currentPage = 1;
      let totalPages = 1;

      // Load projects
      async function loadProjects(page = 1) {
        currentPage = page;

        const search = $("#search").val();
        const category = $("#category").val();
        const sort = $("#sort").val();

        let url = `${API_URL}?page=${page}&limit=6&sort=${sort}`;

        if (search) url += `&search=${search}`;
        if (category) url += `&category=${category}`;

        try {
          const res = await fetch(url);
          const data = await res.json();

          let html = "";

          data.projects.forEach((p) => {
            html += `
  <div class="col-md-4 mb-3">
    <div class="card-custom">
      <h5>${p.title}</h5>
      <p class="muted">${p.category}</p>
      <p>Raised: ${p.currentFunding} PKR</p>
      <p>Goal: ${p.fundingGoal} PKR</p>

      <a class="btn btn-sm btn-cyber mt-2"
         href="project-detail.html?id=${p._id}">
         View Project
      </a>
    </div>
  </div>
`;
          });

          $("#projectList").html(html);

          totalPages = data.totalPages;
          $("#pageInfo").text(`Page ${data.currentPage} / ${data.totalPages}`);
        } catch (err) {
          console.log("Error loading projects");
        }
      }

      // Pagination
      function nextPage() {
        if (currentPage < totalPages) {
          loadProjects(currentPage + 1);
        }
      }

      function prevPage() {
        if (currentPage > 1) {
          loadProjects(currentPage - 1);
        }
      }

      loadProjects(1);
    </script>
  </body>
</html>
